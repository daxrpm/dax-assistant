#   -e NEXTCLOUD_USERNAME=dax \
#   -e NEXTCLOUD_PASSWORD=app_password \
#   ghcr.io/cbcoutinho/nextcloud-mcp-server:latest
#
# [servers.nextcloud]
# transport = "streamable_http"
# url = "http://127.0.0.1:8000/mcp"
# enabled = false

