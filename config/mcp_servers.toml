# MCP Server Definitions
# Each server runs as a subprocess managed by Dax.
# Add servers here and they become available as tools automatically.
#
# Official registry: https://github.com/modelcontextprotocol/servers
# Community list:    https://github.com/punkpeye/awesome-mcp-servers
# MCP Spec:          https://spec.modelcontextprotocol.io/
#
# Fields:
#   command   = Program to run (npx, uvx, node, python)
#   args      = Command arguments
#   env       = Environment variables for the server
#   transport = "stdio" (default) or "streamable_http"
#   url       = Server URL (only for streamable_http transport)
#   enabled   = true/false

# --- OFFICIAL MCP SERVERS ---

# [servers.filesystem]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/daxrpm/Desktop", "/home/daxrpm/Documents"]
# enabled = true

